name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run schema tests
        run: |
          python -c "from schemas.takeoff_schema import TakeoffSchedule; print('Schema OK')"

      - name: Run evaluation tests
        run: |
          python -m evaluation.metrics

      - name: Validate sample data
        run: |
          python -c "
          import json
          from pathlib import Path
          from schemas.takeoff_schema import validate_takeoff

          for f in Path('data/ground_truth').glob('*.json'):
              with open(f) as fp:
                  data = json.load(fp)
              print(f'{f.name}: OK')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          pip install ruff black

      - name: Check formatting
        run: black --check .

      - name: Lint
        run: ruff check .
